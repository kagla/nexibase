services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nexibase
      MYSQL_DATABASE: nexibase
      MYSQL_USER: nexibase
      MYSQL_PASSWORD: nexibase
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pnexibase"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://nexibase:nexibase@db:3306/nexibase"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "change-me-in-production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    # Optional: pass SMTP / OAuth / CAPTCHA keys via .env
    # env_file:
    #   - .env
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/public/uploads

volumes:
  db_data:
  app_uploads:
